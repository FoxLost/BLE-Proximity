name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  SOLUTION_PATH: BLEProximity.sln
  PROJECT_PATH: BLEProximity/BLEProximity.csproj

jobs:
  build-test-publish:
    name: Build, Test, Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH -c Release --no-restore

      - name: Test
        run: dotnet test $env:SOLUTION_PATH -c Release --no-build

      - name: Publish compact
        run: >
          dotnet publish $env:PROJECT_PATH
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:OutputType=WinExe
          -o release-artifacts/compact

      - name: Publish self-contained
        run: >
          dotnet publish $env:PROJECT_PATH
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:OutputType=WinExe
          -o release-artifacts/self-contained

      - name: Upload compact artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLE-Proximity-compact-win-x64
          path: release-artifacts/compact/

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLE-Proximity-self-contained-win-x64
          path: release-artifacts/self-contained/
