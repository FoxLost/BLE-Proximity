stages:
  - test
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  PROJECT_PATH: "BLEProximity/BLEProximity.csproj"
  SOLUTION_PATH: "BLEProximity.sln"

test:
  stage: test
  tags:
    - windows
  script:
    - dotnet restore $env:SOLUTION_PATH
    - dotnet build $env:SOLUTION_PATH -c Release --no-restore
    - dotnet test $env:SOLUTION_PATH -c Release --no-build

publish_compact:
  stage: publish
  tags:
    - windows
  script:
    - dotnet publish $env:PROJECT_PATH -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:OutputType=WinExe -o release-artifacts/compact
  artifacts:
    name: "BLE-Proximity-compact-$CI_COMMIT_SHORT_SHA"
    paths:
      - release-artifacts/compact/
    expire_in: 14 days

publish_self_contained:
  stage: publish
  tags:
    - windows
  script:
    - dotnet publish $env:PROJECT_PATH -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:OutputType=WinExe -o release-artifacts/self-contained
  artifacts:
    name: "BLE-Proximity-self-contained-$CI_COMMIT_SHORT_SHA"
    paths:
      - release-artifacts/self-contained/
    expire_in: 14 days
